<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nutin website</title>
    <meta name="description" content="" />
    <link rel="canonical" href="https://nutin.org/" />

    <!-- Control the SERP snippet: Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nutin.org/" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="https://nutin.org/assets/images/og-cover.jpg" />
    <!-- og:image should be ~1200×630 px -->

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="https://nutin.org/assets/images/og-cover.jpg" />

    <!-- Structured data — Person + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://nutin.org/#website",
          "url": "https://nutin.org/",
          "name": ""
        },
        {
          "@type": "WebPage",
          "@id": "https://nutin.org/#webpage",
          "url": "https://nutin.org/",
          "name": "",
          "description": "",
          "isPartOf": { "@id": "https://nutin.org/#website" },
          "about": { "@id": "https://nutin.org/#person" }
        }
      ]
    }
    </script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <main id="app"></main>  
    <script src="/prism.js"></script>
  </body>
</html>
