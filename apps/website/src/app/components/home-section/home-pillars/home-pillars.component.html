<div class="home-section">
  <h2 data-i18n="home-pillars.title"></h2>
  <p data-i18n="home-pillars.sub" class="home-section__sub"></p>
  <div class="grid">

    <div class="card pillar-card">
      <!-- layout-grid -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="4" width="6" height="6" rx="1"/>
        <rect x="14" y="4" width="6" height="6" rx="1"/>
        <rect x="4" y="14" width="6" height="6" rx="1"/>
        <rect x="14" y="14" width="6" height="6" rx="1"/>
      </svg>
      <p data-i18n="home-pillars.component-title" class="card-title"></p>
      <p data-i18n="home-pillars.component-desc" class="card-desc"></p>
    </div>

    <div class="card pillar-card">
    <!-- singleton: one circle at top, three nodes below all pointing to it -->
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="5" r="2"/>
      <circle cx="4"  cy="19" r="2"/>
      <circle cx="12" cy="19" r="2"/>
      <circle cx="20" cy="19" r="2"/>
      <line x1="4"  y1="17" x2="11" y2="7"/>
      <line x1="12" y1="17" x2="12" y2="7"/>
      <line x1="20" y1="17" x2="13" y2="7"/>
    </svg>
      <p data-i18n="home-pillars.singleton-title" class="card-title"></p>
      <p data-i18n="home-pillars.singleton-desc" class="card-desc"></p>
    </div>

    <div class="card pillar-card">
      <!-- broadcast / radio waves -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18.364 5.636a9 9 0 0 1 0 12.728"/>
        <path d="M5.636 5.636a9 9 0 0 0 0 12.728"/>
        <path d="M15.536 8.464a5 5 0 0 1 0 7.072"/>
        <path d="M8.464 8.464a5 5 0 0 0 0 7.072"/>
        <circle cx="12" cy="12" r="1"/>
      </svg>
      <p data-i18n="home-pillars.event-title" class="card-title"></p>
      <p data-i18n="home-pillars.event-desc" class="card-desc"></p>
    </div>

    <div class="card pillar-card">
      <!-- route -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="6" cy="19" r="2"/>
        <circle cx="18" cy="5" r="2"/>
        <path d="M12 19h4.5a3.5 3.5 0 0 0 0 -7h-8a3.5 3.5 0 0 1 0 -7h3.5"/>
      </svg>
      <p data-i18n="home-pillars.routing-title" class="card-title"></p>
      <p data-i18n="home-pillars.routing-desc" class="card-desc"></p>
    </div>

    <div class="card pillar-card">
      <!-- language -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 5h7M9 3v2c0 4.418 -2.239 8 -5 8"/>
        <path d="M5 9c0 2.144 2.952 3.908 6.7 4"/>
        <path d="M12 20l4 -9 4 9M19.1 18h-6.2"/>
      </svg>
      <p data-i18n="home-pillars.i18n-title" class="card-title"></p>
      <p data-i18n="home-pillars.i18n-desc" class="card-desc"></p>
    </div>

    <div class="card pillar-card">
      <!-- flask / beaker -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 3h6M9 3v6l-4.106 7.399a1 1 0 0 0 .853 1.523l12.506 .078a1 1 0 0 0 .864 -1.511l-4.117 -7.489v-6"/>
        <path d="M9 12.5a4.5 4.5 0 0 1 6 0"/>
      </svg>
      <p data-i18n="home-pillars.testing-title" class="card-title"></p>
      <p data-i18n="home-pillars.testing-desc" class="card-desc"></p>
    </div>

    <!-- <div class="card card-empty"></div>
    <div class="card card-empty"></div> -->

  </div>
</div>
